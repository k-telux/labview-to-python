name: Bug report
description: Report an incorrect, unsafe, or non-portable skill instruction.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What instruction or workflow failed?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include sanitized inputs, outputs, status labels, and screenshots when relevant.
    validations:
      required: true
  - type: dropdown
    id: gate
    attributes:
      label: Gate
      options:
        - Inventory or logic/data
        - Simulator
        - Source UI
        - Packaged EXE
        - Real hardware
        - Documentation or distribution
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I removed secrets, private paths, licensed SDKs, and identifiable experiment data.
          required: true
